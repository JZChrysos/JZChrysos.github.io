<!DOCTYPE html>
<html>
<style>
table, td {
  border: 2px solid black;
  border-collapse: collapse;
}
table {
    table-layout: fixed;
    width: 100%;
    height: 100%;
}
html {
    width: 98%;
    height: 98%;
}
body {
    overflow: hidden;
    width: 100%;
    height: 100%;
}
div {
    display: flex;
    justify-content: center; 
    align-items: center;     
}
h1 {
    text-align: center;
    padding-top: 0;
    padding-bottom: 0;
}
#TileSpace {
    padding-left: 0;
    padding-right: 0;
    padding-top: 0;
    padding-bottom: 0;
    margin-left: auto;
    margin-right: auto;
    display: block;
    width: 600px;
    height: 600px;
}
#TileGuide {
    padding-left: 0;
    padding-right: 0;
    padding-top: 0;
    padding-bottom: 0;
    margin-left: auto;
    margin-right: auto;
    display: block;
    width: 600px;
    height: 400px;
}
</style>

<body>

    <dialog id="winBox" style="top:200px">
            <span class="close" style="cursor:pointer">&times;</span>
            <h2 style="font-style:italic"> Congratulations! </h2>
            <p id="winMessage"> </p>
            <div>
            <div style="gap:30px">
                <button id="yesButton">Yes!</button>
                <button id="noButton">No!</button>
            </div>
            </div>
    </dialog>

    <h1> Wang Tile Game </h1> 
    <div style="gap:400px; padding-bottom:5px">
        <button id="homeButton">Home</button>
    <button id="optionsButton">
        Options
    </button>
    </div>

    <dialog id="optionsBox" style="top:200px">
            <span class="close" style="cursor:pointer">&times;</span>
            <h3> Options: </h3>
            <input type="checkbox" id="highlight"><label for="highlight"> Highlight Valid Tiles</label>
                <br>
            <div>
            <div style="gap:30px">
            <p> Try a different grid size: </p>
            <input type="text" id="sizeInput" maxlength="2" size="2">
            <button id="submitButton">Submit</button>
            </div>
            </div>
    </dialog>


    <canvas id="TileSpace" width="60%" height="60%"></canvas>

    <br>

    <canvas id="TileGuide" width="60%" height="40%"></canvas>


<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script async src="./code/wangtiles.js"></script>

 6. ability to export the image -->

</body>
</html>
